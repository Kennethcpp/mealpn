<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Naija Meal Planner · Your Plan</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --green: #00995C;
            --green-light: #e6f7f0;
            --green-mid: #00995C22;
            --black: #020202;
            --grey: #6b7280;
            --grey-light: #f5f5f5;
            --white: #ffffff;
            --radius: 24px;
            --radius-sm: 12px;
            --shadow: 0 8px 28px rgba(0,153,92,0.09);
            --shadow-hover: 0 18px 40px rgba(0,153,92,0.16);
        }

        body {
            background: var(--white);
            color: var(--black);
            font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .app-wrapper {
            max-width: 1300px;
            width: 100%;
            padding: 0 1.5rem 2rem;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* ===== NAV ===== */
        .navbar {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 0 0.75rem;
            border-bottom: 3px solid var(--green);
            margin-bottom: 2rem;
        }
        .logo h1 { font-size: 2rem; font-weight: 700; color: var(--green); letter-spacing: -0.5px; }
        .logo span {
            font-size: 0.9rem; background: var(--white); padding: 0.2rem 1rem;
            border-radius: 40px; color: var(--black); border: 1px solid #00995C40;
            margin-left: 8px; font-weight: 500;
        }
        .nav-links { display: flex; gap: 1.8rem; align-items: center; flex-wrap: wrap; }
        .nav-links a {
            text-decoration: none; color: var(--black); font-weight: 600; font-size: 0.95rem;
            transition: 0.15s; border-bottom: 2px solid transparent; padding-bottom: 4px;
        }
        .nav-links a:hover { color: var(--green); border-bottom-color: var(--green); }
        .nav-links a i { margin-right: 6px; color: var(--green); }
        .day-time-tracker {
            background: var(--white); padding: 0.3rem 1.2rem; border-radius: 40px;
            font-weight: 600; font-size: 0.9rem; border: 1px solid #00995C30; white-space: nowrap;
        }
        .day-time-tracker i { color: var(--green); margin-right: 6px; }

        /* ===== PLAN HEADER ===== */
        .plan-header {
            display: flex;
            flex-wrap: wrap;
            align-items: flex-start;
            justify-content: space-between;
            gap: 1rem;
            margin-bottom: 1.6rem;
        }
        .plan-header-left h2 {
            font-size: 1.8rem; font-weight: 700; color: var(--black); letter-spacing: -0.3px;
        }
        .plan-header-left h2 span { color: var(--green); }
        .plan-header-left p { color: var(--grey); margin-top: 0.25rem; font-size: 0.95rem; }

        .goal-switcher {
            display: flex; gap: 0.5rem; flex-wrap: wrap;
        }
        .goal-btn {
            padding: 0.4rem 1.1rem; border-radius: 30px; border: 2px solid #e5e7eb;
            background: var(--white); font-size: 0.85rem; font-weight: 600; cursor: pointer;
            transition: all 0.15s; color: var(--grey);
        }
        .goal-btn.active, .goal-btn:hover { border-color: var(--green); color: var(--green); background: var(--green-light); }

        /* ===== TIMELINE STRIP (signature element) ===== */
        .timeline-strip {
            background: var(--grey-light);
            border-radius: var(--radius);
            padding: 1.2rem 2rem;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0;
            overflow-x: auto;
            position: relative;
        }
        .tl-node {
            display: flex; flex-direction: column; align-items: center; gap: 0.3rem;
            flex: 1; min-width: 72px; position: relative; cursor: default;
        }
        .tl-node:not(:last-child)::after {
            content: '';
            position: absolute;
            top: 18px;
            left: 55%;
            right: -45%;
            height: 2px;
            background: #d1d5db;
            z-index: 0;
        }
        .tl-node.passed:not(:last-child)::after { background: var(--green); }

        .tl-dot {
            width: 36px; height: 36px; border-radius: 50%;
            border: 2px solid #d1d5db;
            background: var(--white);
            display: flex; align-items: center; justify-content: center;
            font-size: 0.9rem; color: var(--grey); z-index: 1; transition: all 0.2s;
        }
        .tl-node.passed .tl-dot { background: var(--green); border-color: var(--green); color: var(--white); }
        .tl-node.active .tl-dot {
            background: var(--white); border-color: var(--green); color: var(--green);
            box-shadow: 0 0 0 4px #00995C22; transform: scale(1.18);
        }
        .tl-label { font-size: 0.72rem; font-weight: 600; color: var(--grey); text-align: center; white-space: nowrap; }
        .tl-node.active .tl-label { color: var(--green); }
        .tl-time { font-size: 0.66rem; color: #aaa; }

        /* ===== TRACKER BADGE ===== */
        .tracker-row {
            display: flex; align-items: center; gap: 1rem; margin-bottom: 1.8rem; flex-wrap: wrap;
        }
        .tracker-badge {
            display: inline-flex; align-items: center; gap: 0.5rem;
            background: #FFFFFF; border: 1.5px solid var(--green-mid);
            border-radius: 30px; padding: 0.4rem 1.1rem;
            font-size: 0.85rem; font-weight: 600; color: var(--green);
        }
        .tracker-badge i { font-size: 0.9rem; }
        .macro-summary {
            display: flex; gap: 1rem; flex-wrap: wrap;
        }
        .macro-pill {
            background: #FFFFFF); border-radius: 20px; padding: 0.3rem 0.9rem;
            font-size: 0.8rem; font-weight: 600; color: var(--black);
        }
        .macro-pill span { color: var(--green); }

        /* ===== MEALS GRID ===== */
        .meals-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.4rem;
            margin-bottom: 2rem;
        }
        @media (max-width: 900px) { .meals-grid { grid-template-columns: 1fr 1fr; } }
        @media (max-width: 600px) { .meals-grid { grid-template-columns: 1fr; } }

        /* ===== MEAL CARD ===== */
        .meal-card {
            background: #FFFFFF;
            border: 2px solid #010101;
            border-radius: var(--radius);
            padding: 1.6rem;
            box-shadow: var(--shadow);
            transition: all 0.2s;
            display: flex; flex-direction: column; gap: 1rem;
            position: relative;
        }
        .meal-card:hover { box-shadow: var(--shadow-hover); transform: translateY(-4px); border-color: #010101; }
        .meal-card.current { border-color: red; }
        .meal-card.current::before {
            content: 'NOW';
            position: absolute; top: -10px; left: 1.4rem;
            background: red; color: var(--white);
            font-size: 0.65rem; font-weight: 800; letter-spacing: 1px;
            padding: 0.15rem 0.7rem; border-radius: 20px;
        }

        .meal-type-row {
            display: flex; align-items: center; justify-content: space-between;
        }
        .meal-type-badge {
            display: inline-flex; align-items: center; gap: 0.4rem;
            font-size: 0.72rem; font-weight: 700; letter-spacing: 0.5px;
            text-transform: uppercase; color: var(--green);
        }
        .meal-type-badge i { font-size: 0.8rem; }
        .meal-time { font-size: 0.78rem; color: var(--grey); font-weight: 500; }

        .meal-name { font-size: 1.25rem; font-weight: 700; color: var(--black); line-height: 1.25; }
        .meal-desc { font-size: 0.85rem; color: var(--grey); line-height: 1.5; }

        /* macros row */
        .meal-macros {
            display: flex; gap: 0.5rem; flex-wrap: wrap;
        }
        .mac { 
            font-size: 0.73rem; font-weight: 700; padding: 0.25rem 0.7rem;
            border-radius: 20px; background: var(--grey-light); color: var(--black);
        }
        .mac.cal { background: #fff3e0; color: #e65c00; }
        .mac.pro { background: #e8f5e9; color: #2e7d32; }
        .mac.carb { background: #e3f2fd; color: #1565c0; }
        .mac.fat { background: #fce4ec; color: #c62828; }

        /* ingredients */
        .ingredients-section { }
        .section-label {
            font-size: 0.72rem; font-weight: 700; letter-spacing: 0.5px;
            text-transform: uppercase; color: var(--grey); margin-bottom: 0.5rem;
        }
        .ingredient-tags { display: flex; flex-wrap: wrap; gap: 0.4rem; }
        .ing-tag {
            font-size: 0.78rem; padding: 0.22rem 0.75rem; border-radius: 20px;
            background: #FFFFFF; color: var(--black);
            border: 1px solid #00995C30; font-weight: 500;
        }
        .ing-tag i { color: var(--green); margin-right: 4px; font-size: 0.7rem; }

        /* prep */
        .meal-meta { display: flex; gap: 1rem; }
        .meta-item { font-size: 0.78rem; color: var(--grey); display: flex; align-items: center; gap: 0.3rem; }
        .meta-item i { color: var(--green); font-size: 0.75rem; }

        /* substitutes */
        .subs-toggle {
            background: none; border: none; font-size: 0.8rem; font-weight: 600;
            color: var(--green); cursor: pointer; display: flex; align-items: center; gap: 0.3rem;
            padding: 0; margin-top: 0.2rem;
        }
        .subs-panel {
            display: none; background: var(--grey-light); border-radius: var(--radius-sm);
            padding: 0.75rem 1rem; margin-top: 0.5rem;
        }
        .subs-panel.open { display: block; }
        .sub-item {
            font-size: 0.82rem; color: var(--black); padding: 0.3rem 0;
            border-bottom: 1px solid #e5e7eb; display: flex; align-items: flex-start; gap: 0.5rem;
        }
        .sub-item:last-child { border-bottom: none; }
        .sub-item i { color: var(--green); margin-top: 2px; flex-shrink: 0; }

        /* ===== SNACK SECTION ===== */
        .snacks-section { margin-bottom: 2rem; }
        .snacks-section h3 {
            font-size: 1.2rem; font-weight: 700; margin-bottom: 1rem; color: var(--black);
            display: flex; align-items: center; gap: 0.5rem;
        }
        .snacks-section h3 i { color: var(--green); }
        .snacks-grid { display: flex; flex-wrap: wrap; gap: 1rem; }
        .snack-card {
            background: var(--white); border: 2px solid #010101; border-radius: var(--radius-sm);
            padding: 1rem 1.3rem; flex: 1; min-width: 200px; max-width: 280px;
            box-shadow: var(--shadow); transition: all 0.2s;
        }
        .snack-card:hover { border-color: #010101; transform: translateY(-2px); }
        .snack-slot { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--grey); margin-bottom: 0.3rem; }
        .snack-name { font-size: 1rem; font-weight: 700; margin-bottom: 0.25rem; }
        .snack-note { font-size: 0.8rem; color: var(--grey); line-height: 1.4; }
        .snack-cal { font-size: 0.75rem; font-weight: 700; color: #e65c00; margin-top: 0.4rem; background: #fff3e0; display: inline-block; padding: 0.15rem 0.6rem; border-radius: 12px; }

        /* ===== FOOTER ===== */
        .footer {
            margin-top: auto; padding: 1.2rem 0 0.5rem;
            border-top: 2px solid #00995C20;
            display: flex; flex-wrap: wrap; justify-content: space-between;
            align-items: center; gap: 1rem; font-size: 0.9rem; color: #020202aa;
        }
        .footer .left i, .footer .right i { color: var(--green); margin-right: 4px; }
        .footer .right { display: flex; gap: 1.5rem; flex-wrap: wrap; }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 700px) {
            .navbar { flex-direction: column; align-items: flex-start; gap: 0.8rem; }
            .nav-links { width: 100%; justify-content: flex-start; gap: 1.2rem; }
            .day-time-tracker { font-size: 0.8rem; padding: 0.2rem 1rem; }
            .timeline-strip { padding: 1rem 1rem; gap: 0; }
            .tl-label, .tl-time { font-size: 0.62rem; }
            .plan-header { flex-direction: column; }
            .footer { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>

// Timeline config
const TIMELINE_NODES = [
    { key: 'breakfast', label: 'Breakfast', icon: 'fa-sun', startH: 7, endH: 9 },
    { key: 'snack1',    label: 'Snack 1',   icon: 'fa-apple-alt', startH: 10, endH: 11 },
    { key: 'lunch',     label: 'Lunch',     icon: 'fa-cloud-sun', startH: 12, endH: 14 },
    { key: 'snack2',    label: 'Snack 2',   icon: 'fa-cookie-bite', startH: 16, endH: 17 },
    { key: 'dinner',    label: 'Dinner',    icon: 'fa-moon', startH: 18, endH: 21 }
];

// ============================================================
// STATE
// ============================================================
let currentGoal = 'gain';
let planDay = 1;  // 1-indexed, stored in localStorage

function loadState() {
    const urlParams = new URLSearchParams(window.location.search);
    currentGoal = urlParams.get('goal') || localStorage.getItem('mp_goal') || 'gain';

    // Day tracking: persist plan start date
    const startKey = 'mp_start_' + currentGoal;
    let startDate = localStorage.getItem(startKey);
    if (!startDate) {
        startDate = new Date().toDateString();
        localStorage.setItem(startKey, startDate);
    }
    const start = new Date(startDate);
    const now = new Date();
    const diff = Math.floor((now - start) / (1000 * 60 * 60 * 24));
    const goalData = GOALS[currentGoal];
    const totalDays = goalData.days.length;
    planDay = (diff % totalDays) + 1;
}

function saveGoal(goal) {
    localStorage.setItem('mp_goal', goal);
}

// ============================================================
// RENDER
// ============================================================
function getCurrentMealIndex() {
    const h = new Date().getHours() + new Date().getMinutes() / 60;
    if (h < 10) return 0;
    if (h < 14) return 1;
    return 2;
}

function renderTimeline() {
    const h = new Date().getHours() + new Date().getMinutes() / 60;
    const strip = document.getElementById('timelineStrip');
    strip.innerHTML = TIMELINE_NODES.map((node, i) => {
        let state = '';
        if (h >= node.endH) state = 'passed';
        else if (h >= node.startH) state = 'active';
        return `<div class="tl-node ${state}">
            <div class="tl-dot"><i class="fas ${node.icon}"></i></div>
            <div class="tl-label">${node.label}</div>
            <div class="tl-time">${node.startH > 12 ? node.startH-12 : node.startH}${node.startH >= 12 ? 'pm':'am'}</div>
        </div>`;
    }).join('');
}

function renderPlan() {
    const data = GOALS[currentGoal];
    const dayIdx = (planDay - 1) % data.days.length;
    const dayData = data.days[dayIdx];
    const currentMealIdx = getCurrentMealIndex();

    // Header
    document.getElementById('goalLabel').textContent = data.label;
    document.getElementById('planSubtitle').textContent = data.subtitle;
    document.getElementById('dayBadge').textContent = `Day ${planDay} of your plan`;

    // Macro summary
    document.getElementById('macroSummary').innerHTML = `
        <div class="macro-pill">🔥 <span>${data.totalCal}</span> kcal/day</div>
        <div class="macro-pill">💪 Protein <span>${data.protein}g</span></div>
        <div class="macro-pill">🍚 Carbs <span>${data.carbs}g</span></div>
        <div class="macro-pill">🥑 Fat <span>${data.fat}g</span></div>
    `;

    // Goal buttons
    document.querySelectorAll('.goal-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.goal === currentGoal);
    });

    // Meals
    document.getElementById('mealsGrid').innerHTML = dayData.meals.map((meal, i) => {
        const isCurrent = i === currentMealIdx;
        return `<div class="meal-card ${isCurrent ? 'current' : ''}">
            <div class="meal-type-row">
                <div class="meal-type-badge"><i class="fas ${meal.icon}"></i> ${meal.type}</div>
                <div class="meal-time"><i class="fas fa-clock" style="color:var(--green);margin-right:4px;"></i>${meal.time}</div>
            </div>
            <div class="meal-name">${meal.name}</div>
            <div class="meal-desc">${meal.desc}</div>
            <div class="meal-macros">
                <span class="mac cal">🔥 ${meal.cal} kcal</span>
                <span class="mac pro">💪 ${meal.protein}g protein</span>
                <span class="mac carb">🍚 ${meal.carbs}g carbs</span>
                <span class="mac fat">🥑 ${meal.fat}g fat</span>
            </div>
            <div class="ingredients-section">
                <div class="section-label"><i class="fas fa-list-ul" style="color:var(--green);margin-right:4px;"></i>Key Ingredients</div>
                <div class="ingredient-tags">${meal.ingredients.map(ing => `<span class="ing-tag"><i class="fas fa-check-circle"></i>${ing}</span>`).join('')}</div>
            </div>
            <div class="meal-meta">
                <div class="meta-item"><i class="fas fa-knife"></i> Prep: ${meal.prepTime}</div>
                <div class="meta-item"><i class="fas fa-fire-burner"></i> Cook: ${meal.cookTime}</div>
            </div>
            <div>
                <button class="subs-toggle" onclick="toggleSubs(this)"><i class="fas fa-exchange-alt"></i> Show substitutes</button>
                <div class="subs-panel">
                    ${meal.subs.map(s => `<div class="sub-item"><i class="fas fa-arrow-right-arrow-left"></i><span>${s}</span></div>`).join('')}
                </div>
            </div>
        </div>`;
    }).join('');

    // Snacks
    document.getElementById('snacksGrid').innerHTML = dayData.snacks.map(snack => `
        <div class="snack-card">
            <div class="snack-slot"><i class="fas fa-clock" style="color:var(--green);margin-right:4px;"></i>${snack.slot}</div>
            <div class="snack-name">${snack.name}</div>
            <div class="snack-note">${snack.note}</div>
            <div class="snack-cal">~${snack.cal} kcal</div>
        </div>
    `).join('');
}

function switchGoal(goal) {
    currentGoal = goal;
    saveGoal(goal);
    loadState();
    renderPlan();
    renderTimeline();
    // Update URL without reload
    const url = new URL(window.location);
    url.searchParams.set('goal', goal);
    window.history.replaceState({}, '', url);
}

function toggleSubs(btn) {
    const panel = btn.nextElementSibling;
    const open = panel.classList.toggle('open');
    btn.innerHTML = open
        ? '<i class="fas fa-times"></i> Hide substitutes'
        : '<i class="fas fa-exchange-alt"></i> Show substitutes';
}

// ============================================================
// DATE/TIME
// ============================================================
function updateDateTime() {
    const now = new Date();
    document.getElementById('dateTimeDisplay').textContent = now.toLocaleDateString('en-NG', {
        weekday: 'short', month: 'short', day: 'numeric',
        hour: '2-digit', minute: '2-digit', hour12: true
    });
}

// ============================================================
// INIT
// ============================================================
loadState();
renderPlan();
renderTimeline();
updateDateTime();
setInterval(updateDateTime, 1000);
setInterval(renderTimeline, 60000); // refresh timeline every minute
</script>
